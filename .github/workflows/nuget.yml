name: nuget deploy

# Calls the reusable workflows in RushuiGuan/devops:
#   - push to `rc`      -> prerelease to GitHub Packages
#   - push tag `vX.Y.Z` -> stable release to nuget.org (tag must be on `production`)
# `main` is the work branch and publishes nothing.
on:
  push:
    branches:
      - rc
    tags:
      - 'v*'
  workflow_dispatch:   # manual "Run workflow" button (select the rc branch to publish a prerelease)

permissions:
  contents: read
  packages: write   # caps the token for the called workflows (prerelease needs write)
  id-token: write   # required so the OIDC token carries job_workflow_ref for Trusted Publishing

jobs:
  prerelease:
    if: github.ref == 'refs/heads/rc'
    uses: RushuiGuan/devops/.github/workflows/nuget-prerelease.yml@v1
    secrets: inherit

  nuget-release:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: RushuiGuan/devops/.github/workflows/nuget-release-nugetorg.yml@v1
    with:
      nuget-user: Rushui   # nuget.org profile name (verify this matches your account)
