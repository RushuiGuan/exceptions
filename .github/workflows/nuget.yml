name: nuget

# Two publish channels to GitHub Packages:
#   - push to `rc`     -> prerelease  {Version}-rc.{commit count}
#   - push tag `vX.Y.Z`-> stable      {Version}   (only when the tag is on `production`)
# `main` is the work branch and intentionally publishes nothing.
on:
  push:
    branches:
      - rc
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  prerelease:
    if: github.ref == 'refs/heads/rc'
    runs-on: ubuntu-latest
    concurrency:
      group: nuget-prerelease
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git rev-list --count` is accurate

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        run: |
          base=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          # Block candidates for a version that has already been released.
          # Exact match only: v1.0.0 existing blocks 1.0.0-rc.N, but an unrelated
          # higher release (e.g. v1.0.1) does not block 1.0.0-rc.N.
          if git rev-parse -q --verify "refs/tags/v${base}" >/dev/null; then
            echo "::error::v${base} is already released — bump <Version> in Directory.Build.props before publishing new candidates"
            exit 1
          fi
          count=$(git rev-list --count HEAD)
          version="${base}-rc.${count}"
          echo "Prerelease version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          # Pack every project listed under the `# packages` section of .projects.
          # Each entry is a folder name containing a like-named .csproj.
          projects=$(awk '{sub(/\r$/,"")} /^# packages$/{f=1;next} /^#/{f=0} f && NF {print $1}' .projects)
          if [ -z "$projects" ]; then
            echo "::error::no packages found under '# packages' in .projects"
            exit 1
          fi
          for p in $projects; do
            echo "Packing $p"
            dotnet pack "$p/$p.csproj" -c Release -p:Version=${{ steps.version.outputs.version }} -o out
          done

      - name: Push to GitHub Packages
        run: |
          for pkg in out/*.nupkg; do
            dotnet nuget push "$pkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history + branches for the production ancestor check

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Guard - tag version matches Directory.Build.props
        run: |
          tag="${GITHUB_REF_NAME#v}"
          base=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ "$tag" != "$base" ]; then
            echo "::error::tag version '$tag' does not match Directory.Build.props <Version> '$base'"
            exit 1
          fi
          echo "version=$base" >> "$GITHUB_OUTPUT"
        id: version

      - name: Guard - tag is on the production branch
        run: |
          git fetch origin production
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/production; then
            echo "::error::tag $GITHUB_REF_NAME ($GITHUB_SHA) is not on the production branch"
            exit 1
          fi

      - name: Pack
        run: |
          # Pack every project listed under the `# packages` section of .projects.
          # Each entry is a folder name containing a like-named .csproj.
          projects=$(awk '{sub(/\r$/,"")} /^# packages$/{f=1;next} /^#/{f=0} f && NF {print $1}' .projects)
          if [ -z "$projects" ]; then
            echo "::error::no packages found under '# packages' in .projects"
            exit 1
          fi
          for p in $projects; do
            echo "Packing $p"
            dotnet pack "$p/$p.csproj" -c Release -p:Version=${{ steps.version.outputs.version }} -o out
          done

      - name: Push to GitHub Packages
        run: |
          for pkg in out/*.nupkg; do
            dotnet nuget push "$pkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          done
